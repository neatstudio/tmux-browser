name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Pack run file
        run: npm run pack:run

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          npm run release:notes -- --out release/release-notes.md --zh-out release/release-notes.zh-CN.md
          { cat release/release-notes.md; printf '\n'; cat release/release-notes.zh-CN.md; } > release/release-notes.combined.md

      - name: Upload run artifact
        uses: actions/upload-artifact@v7
        with:
          name: release.run
          path: |
            install.sh
            release/release.run
            release/release-notes.md
            release/release-notes.zh-CN.md
            release/release-notes.combined.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file release/release-notes.combined.md

            gh release upload "$TAG" \
              install.sh \
              release/release.run \
              "release/tmux-ui-${VERSION}.run" \
              --clobber
            exit 0
          fi

          gh release create "$TAG" \
            install.sh \
            release/release.run \
            "release/tmux-ui-${VERSION}.run" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release/release-notes.combined.md
