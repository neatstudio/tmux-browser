name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Pack run file
        run: npm run pack:run

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: release.run
          path: release/release.run

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "$TAG already has a GitHub Release; skip publishing"
            exit 0
          fi

          gh release create "$TAG" \
            release/release.run \
            "release/tmux-ui-${VERSION}.run" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "tmux-ui ${VERSION}"
